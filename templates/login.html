<!DOCTYPE html>
<html>
<head>
    <title>Amazon Price Tracker - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #232f3e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }
        h1 {
            color: #ff9900;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #ff9900;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
    <form method="POST">
        <h1>🛒 Amazon Tracker</h1>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </form>
</div>
</body>
</html>
