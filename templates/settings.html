<!DOCTYPE html>
<html>
<head>
    <title>Amazon Price Tracker - Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
        }
        .navbar {
            background-color: #232f3e;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #ff9900; margin: 0; font-size: 22px; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        h2 { color: #232f3e; margin-bottom: 20px; }
        label { color: #555; font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 15px;
        }
        input:focus { outline: none; border-color: #ff9900; }
        .competitor {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        button {
            padding: 12px 25px;
            background: #ff9900;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #e68900; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🛒 Amazon Tracker</h1>
        <div>
            <a href="/">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2>⚙️ Your Settings</h2>
            <form method="POST">
                <label>Your Product ASIN</label>
                <input type="text" name="my_asin" value="{{ user.my_asin }}" placeholder="e.g. B0DB99PD1B">
                <label>Your Price ($)</label>
                <input type="number" name="my_price" step="0.01" value="{{ user.my_price }}" placeholder="e.g. 29.99">
                <h2>🏆 Competitors</h2>
                {% for comp in competitors %}
                <div class="competitor">
                    <input type="text" name="comp_name" value="{{ comp.name }}" placeholder="Competitor name">
                    <input type="text" name="comp_asin" value="{{ comp.asin }}" placeholder="Competitor ASIN">
                </div>
                {% endfor %}
                <div id="competitors-list">
    {% for comp in competitors %}
    <div class="competitor">
        <input type="text" name="comp_name" value="{{ comp.name }}" placeholder="Competitor name">
        <input type="text" name="comp_asin" value="{{ comp.asin }}" placeholder="Competitor ASIN">
    </div>
    {% endfor %}
    <div class="competitor">
        <input type="text" name="comp_name" placeholder="Competitor name">
        <input type="text" name="comp_asin" placeholder="Competitor ASIN">
    </div>
</div>
<br>
<button type="button" onclick="addCompetitor()">+ Add Another Competitor</button>
<br><br>
<button type="submit">💾 Save Settings</button>

<script>
function addCompetitor() {
    const list = document.getElementById('competitors-list');
    const div = document.createElement('div');
    div.className = 'competitor';
    div.innerHTML = `
        <input type="text" name="comp_name" placeholder="Competitor name">
        <input type="text" name="comp_asin" placeholder="Competitor ASIN">
    `;
    list.appendChild(div);
}
</script>
            </form>
        </div>
    </div>
</body>
</html>
