<!DOCTYPE html>
<html>
<head>
    <title>Amazon Price Tracker - Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #232f3e 0%, #37475a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
        h1 {
            color: #232f3e;
            font-size: 24px;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff9900;
        }
        button {
            width: 100%;
            padding: 13px;
            background: #ff9900;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover { background: #e68900; }
        .login-link {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .login-link a { color: #ff9900; text-decoration: none; }
        .error {
            background: #ffe0e0;
            color: #cc0000;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">🛒</div>
        <h1>Create Account</h1>
        <p class="subtitle">Start tracking your Amazon prices today</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>
        <p class="login-link">Already have an account? <a href="/login">Login</a></p>
    </div>
</body>
</html>
