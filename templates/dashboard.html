<!DOCTYPE html>
<html>
<head>
    <title>Amazon Price Tracker - Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #232f3e;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            color: #ff9900;
            margin: 0;
        }
        .navbar a {
            color: white;
            text-decoration: none;
        }
        .container {
            padding: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background-color: #232f3e;
            color: white;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        .cheaper {
            color: green;
            font-weight: bold;
        }
        .warning {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🛒 Amazon Price Tracker</h1>
        <a href="/logout">Logout</a>
    </div>
    <div class="container">
        <h2>Today's Price Report</h2>
        <table>
            <tr>
                <th>Seller</th>
                <th>Product</th>
                <th>Price</th>
                <th>Difference</th>
                <th>Status</th>
            </tr>
            {% for seller, product, price, difference, status in results %}
            <tr>
                <td>{{ seller }}</td>
                <td>{{ product }}</td>
                <td>${{ price }}</td>
                <td>{{ difference }}</td>
                <td class="{{ 'cheaper' if 'cheaper' in status else 'warning' }}">{{ status }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
